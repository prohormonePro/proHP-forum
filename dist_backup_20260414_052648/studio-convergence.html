function RadarChart({ data, size = 180 }) {
  const keys = Object.keys(data.sovereign);
  const n = keys.length;
  const cx = size / 2, cy = size / 2, r = size * 0.36;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  const getPoint = (value, i) => {
    const angle = startAngle + i * angleStep;
    const dist = (value / 100) * r;
    return { x: cx + dist * Math.cos(angle), y: cy + dist * Math.sin(angle) };
  };

  const makePath = (vals) => keys.map((k, i) => {
    const p = getPoint(vals[k], i);
    return `${i === 0 ? "M" : "L"}${p.x},${p.y}`;
  }).join(" ") + " Z";

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[25, 50, 75, 100].map(level => (
        <polygon key={level}
          points={keys.map((_, i) => { const p = getPoint(level, i); return `${p.x},${p.y}`; }).join(" ")}
          fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1"
        />
      ))}
      {keys.map((_, i) => {
        const p = getPoint(100, i);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />;
      })}
      <polygon points={makePath(data.original)} fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.25)" strokeWidth="1.5" />
      <polygon points={makePath(data.sovereign)} fill="rgba(0,200,255,0.08)" stroke="rgba(0,200,255,0.5)" strokeWidth="1.5" />
      {keys.map((k, i) => {
        const p = getPoint(114, i);
        const lines = metricLabels[k].split(" ");
        return (
          <text key={k} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle"
            fill="#6b7280" fontSize="7.5" fontFamily="ui-monospace, monospace">
            {lines.map((w, j) => (
              <tspan key={j} x={p.x} dy={j === 0 ? -(lines.length - 1) * 4.5 : 9}>{w}</tspan>
            ))}
          </text>
        );
      })}
    </svg>
  );
}
